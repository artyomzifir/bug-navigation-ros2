services:
  terminal:
    build: .
    image: amr_burger:jazzy
    container_name: amr_terminal
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - DISPLAY
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video,graphics,display
      - ROS_DOMAIN_ID=0
    volumes:
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      - .:/ros2_ws/src:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri:rw
    working_dir: /ros2_ws
    command: bash